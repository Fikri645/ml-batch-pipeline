name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Lint ────────────────────────────────────────────────────────────────
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install flake8
        run: pip install flake8==7.0.0

      - name: Run flake8
        run: flake8 src/ scripts/ dags/ tests/ docker/scorer_entrypoint.py

  # ── 2. Unit tests ──────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          # Install core ML/data deps + test deps only (no airflow, no dbt, no psycopg2 binary for CI)
          pip install \
            lightgbm==4.3.0 \
            scikit-learn==1.4.2 \
            pandas==2.2.1 \
            numpy==1.26.4 \
            joblib==1.4.0 \
            SQLAlchemy==2.0.29 \
            python-dotenv==1.0.1 \
            requests==2.31.0 \
            pytest==8.1.1 \
            pytest-cov==5.0.0

          # psycopg2-binary may fail on some CI runners — install with fallback
          pip install psycopg2-binary==2.9.9 || pip install psycopg2==2.9.9

      - name: Run unit tests with coverage
        env:
          DATABASE_URL: postgresql://fake:fake@localhost:5432/fake_db
          MODEL_PATH: models/lgbm_fraud.pkl
        run: |
          pytest tests/ \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml \
            -v \
            --ignore=tests/test_score.py  # score tests need live DB mock wiring

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  # ── 3. Full test suite (with mocked DB) ───────────────────────────────────
  test-full:
    name: Full Test Suite (mocked DB)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install \
            lightgbm==4.3.0 \
            scikit-learn==1.4.2 \
            pandas==2.2.1 \
            numpy==1.26.4 \
            joblib==1.4.0 \
            SQLAlchemy==2.0.29 \
            python-dotenv==1.0.1 \
            requests==2.31.0 \
            pytest==8.1.1 \
            pytest-cov==5.0.0
          pip install psycopg2-binary==2.9.9 || pip install psycopg2==2.9.9

      - name: Run all tests
        env:
          DATABASE_URL: postgresql://fake:fake@localhost:5432/fake_db
          MODEL_PATH: models/lgbm_fraud.pkl
        run: |
          pytest tests/ \
            --cov=src \
            --cov-report=term-missing \
            -v

  # ── 4. DAG import test ────────────────────────────────────────────────────
  dag-import:
    name: DAG Import Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Airflow + providers
        run: |
          pip install --upgrade pip
          # Pin Airflow version to match docker-compose image
          AIRFLOW_VERSION=2.9.1
          PYTHON_VERSION=3.11
          CONSTRAINT_URL="https://raw.githubusercontent.com/apache/airflow/constraints-${AIRFLOW_VERSION}/constraints-${PYTHON_VERSION}.txt"
          # Let the constraint file resolve the provider version (avoids pin conflicts)
          pip install "apache-airflow==${AIRFLOW_VERSION}" \
            apache-airflow-providers-postgres \
            --constraint "${CONSTRAINT_URL}"

          # Install src deps so DAG imports succeed
          pip install \
            lightgbm==4.3.0 \
            scikit-learn==1.4.2 \
            pandas==2.2.1 \
            numpy==1.26.4 \
            joblib==1.4.0 \
            SQLAlchemy==2.0.29 \
            python-dotenv==1.0.1 \
            requests==2.31.0
          pip install psycopg2-binary==2.9.9 || pip install psycopg2==2.9.9

      - name: Test DAG imports
        env:
          AIRFLOW__CORE__DAGS_FOLDER: ${{ github.workspace }}/dags
          DATABASE_URL: postgresql://fake:fake@localhost:5432/fake_db
          MODEL_PATH: models/lgbm_fraud.pkl
        run: |
          # Set up a minimal Airflow home with sqlite metadata DB
          export AIRFLOW_HOME=$(mktemp -d)
          export AIRFLOW__DATABASE__SQL_ALCHEMY_CONN="sqlite:///${AIRFLOW_HOME}/airflow.db"
          airflow db migrate --quiet

          # Add project root to PYTHONPATH so src/ is importable
          export PYTHONPATH="${GITHUB_WORKSPACE}:${PYTHONPATH}"

          python - <<'EOF'
          import sys, os
          sys.path.insert(0, os.environ["GITHUB_WORKSPACE"])

          from airflow.models import DagBag
          dagbag = DagBag(dag_folder="dags/", include_examples=False)

          if dagbag.import_errors:
              for dag_file, error in dagbag.import_errors.items():
                  print(f"IMPORT ERROR in {dag_file}:\n{error}")
              sys.exit(1)

          print(f"✓ DAGs loaded successfully: {list(dagbag.dag_ids)}")
          EOF

  # ── 5. dbt compile ────────────────────────────────────────────────────────
  dbt-compile:
    name: dbt Compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dbt-postgres
        # Pin dbt-core<2.0 explicitly — pip may otherwise resolve to 2.0 alpha which dropped postgres
        run: pip install "dbt-postgres==1.8.0" "dbt-core>=1.8.0,<2.0.0"

      - name: Write dbt profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << 'EOF'
          ml_batch_pipeline:
            target: dev
            outputs:
              dev:
                type: postgres
                host: localhost
                port: 5432
                user: pipeline_user
                password: pipeline_pass
                dbname: pipeline_db
                schema: public
                threads: 1
          EOF

      - name: dbt compile (no DB connection needed)
        working-directory: dbt
        run: dbt compile --profiles-dir ~/.dbt --project-dir .
